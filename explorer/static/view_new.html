<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KG Explorer - New Model</title>
<script src="/static/force-graph.min.js"></script>
<script src="/static/3d-force-graph.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080810; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
#content-row { display:flex; flex:1; overflow:hidden; }
#sidebar { width:300px; min-width:300px; flex-shrink:0; background:rgba(18,18,30,0.98); border-right:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; overflow:hidden; }
#sidebar .section { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.06); }
#sidebar .section h3 { font-size:10px; color:#6e7681; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
#sidebar input[type=text], #sidebar select { width:100%; padding:7px 10px; background:#0a0a12; border:1px solid rgba(255,255,255,0.1); color:#e0e0e0; border-radius:6px; font-size:12px; outline:none; }
#sidebar input:focus { border-color:#58a6ff; }
#sidebar button { padding:5px 10px; background:rgba(22,27,34,0.9); border:1px solid rgba(255,255,255,0.1); color:#e0e0e0; border-radius:5px; cursor:pointer; font-size:11px; transition:all 0.15s; }
#sidebar button:hover { background:rgba(88,166,255,0.15); }
#graph-area { flex:1; position:relative; overflow:hidden; }
#graph { width:100%; height:100%; position:absolute; top:0; left:0; }
#chat-sidebar { width:340px; min-width:340px; flex-shrink:0; background:rgba(22,27,34,0.97); border-left:1px solid rgba(255,255,255,0.08); display:flex; flex-direction:column; overflow:hidden; }
#chat-sidebar.hidden { width:0; min-width:0; border:none; overflow:hidden; display:none; }

/* Top bar */
#top-bar { height:48px; background:rgba(8,8,16,0.95); border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; padding:0 20px; flex-shrink:0; }
#top-bar .title { font-size:15px; font-weight:600; color:#58a6ff; }
#top-bar .stats { margin-left:auto; font-size:12px; color:#6e7681; }
#gpu-badge { padding:4px 10px; border-radius:4px; font-size:11px; margin-left:12px; }
#gpu-badge.gpu { background:#1a4d1a; color:#3fb950; }
#gpu-badge.cpu { background:#4d3a1a; color:#d29922; }

#search-results { max-height:200px; overflow-y:auto; margin-top:4px; }
#search-results .item { padding:6px 8px; cursor:pointer; font-size:11px; display:flex; justify-content:space-between; border-radius:4px; }
#search-results .item:hover { background:rgba(88,166,255,0.1); }
#search-results .item .dot { width:8px; height:8px; border-radius:50%; margin-right:6px; flex-shrink:0; margin-top:3px; }

/* Node detail */
#detail { display:none; }
#detail.visible { display:block; }
#detail h2 { font-size:13px; color:#fff; margin-bottom:4px; }
#detail .type-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; margin-bottom:6px; }
#detail .desc { font-size:11px; color:#8b949e; line-height:1.4; margin-bottom:8px; }
#detail .conn-title { font-size:10px; color:#6e7681; text-transform:uppercase; letter-spacing:1px; margin:8px 0 4px; }
#detail .conn { padding:4px 6px; font-size:11px; cursor:pointer; border-radius:4px; margin:2px 0; display:flex; align-items:center; gap:5px; }
#detail .conn:hover { background:rgba(88,166,255,0.1); }
#detail .conn .arrow { color:#58a6ff; font-size:10px; }
#detail .conn .rel { color:#6e7681; font-size:10px; margin-left:auto; }
#detail .conns { max-height:250px; overflow-y:auto; }
#no-detail { color:#6e7681; font-size:11px; font-style:italic; }

/* Toolbar */
#toolbar { position:absolute; top:12px; left:12px; display:flex; gap:6px; z-index:5; }
#toolbar button { padding:6px 12px; background:rgba(22,27,34,0.9); border:1px solid rgba(255,255,255,0.1); color:#e0e0e0; border-radius:6px; cursor:pointer; font-size:11px; backdrop-filter:blur(10px); transition:all 0.15s; }
#toolbar button:hover { background:rgba(88,166,255,0.15); border-color:rgba(88,166,255,0.3); }
#toolbar button.active { background:rgba(88,166,255,0.2); border-color:#58a6ff; color:#58a6ff; }
.filter-tags { display:flex; flex-wrap:wrap; gap:4px; }
.ftag { padding:3px 8px; border-radius:10px; font-size:10px; cursor:pointer; transition:all 0.15s; }
.ftag.off { opacity:0.35; }

/* Chat sidebar buttons */
#chat-sidebar button { transition:all 0.15s; }
#chat-sidebar button.active { background:#1f6feb !important; border-color:#1f6feb !important; color:#fff !important; }
#chat-sidebar button:hover { opacity:0.85; }

/* Legend */
/* Stats bar */
#stats-bar { height:28px; background:rgba(8,8,16,0.9); border-top:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; padding:0 16px; font-size:11px; color:#6e7681; flex-shrink:0; }
#legend { position:absolute; bottom:36px; right:16px; background:rgba(22,27,34,0.9); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:12px; z-index:10; backdrop-filter:blur(10px); }
#legend .item { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:11px; color:#8b949e; cursor:pointer; }
#legend .item:hover { color:#e0e0e0; }
#legend .item .dot { width:10px; height:10px; border-radius:50%; }

/* Depth indicator */
#depth-indicator { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:rgba(22,27,34,0.9); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:6px 16px; font-size:11px; color:#58a6ff; z-index:10; display:none; backdrop-filter:blur(10px); }
/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
</style>
</head>

<!-- Left Sidebar -->

<script>
// ============================================================
// STATE
// ============================================================
var allNodes = [], allEdges = [], nodeMap = {}, adjOut = {}, adjIn = {};
var selectedNode = null;
var focusedNodes = null; // set of node IDs currently visible
var drillDepth = 0;
var drillHistory = [];
var physicsOn = true;
var graph = null;

// Auto-color palette â€” vibrant, distinct
var DOMAIN_COLORS = {
  'Party': '#f0883e', 'Individual': '#f0883e', 'Organization': '#f0883e', 'RelatedParty': '#f0883e',
  'Customer': '#e6194b', 'BillingAccount': '#e6194b', 'PaymentMethod': '#e6194b', 'CreditProfile': '#e6194b', 'OrderItem': '#e6194b', 'Appointment': '#e6194b',
  'Product': '#3cb44b', 'ProductOffering': '#3cb44b', 'ProductSpecification': '#3cb44b', 'ProductPrice': '#3cb44b', 'BundledProductOffering': '#3cb44b', 'ProductOfferingPrice': '#3cb44b', 'Category': '#3cb44b', 'ProductRelationship': '#3cb44b', 'ProductTerm': '#3cb44b',
  'Service': '#4363d8', 'ServiceSpecification': '#4363d8', 'ServiceOrder': '#4363d8', 'CustomerFacingService': '#4363d8', 'ResourceFacingService': '#4363d8', 'ServiceRelationship': '#4363d8', 'ServiceCandidate': '#4363d8',
  'Resource': '#911eb4', 'PhysicalResource': '#911eb4', 'LogicalResource': '#911eb4', 'ResourceSpecification': '#911eb4', 'ResourceRelationship': '#911eb4', 'ResourceCandidate': '#911eb4', 'ResourceOrder': '#911eb4',
  'TroubleTicket': '#f85149', 'Alarm': '#f85149',
  'Agreement': '#42d4f4', 'Account': '#42d4f4',
  'Entity': '#6e7681', 'TimePeriod': '#6e7681', 'Characteristic': '#6e7681', 'ContactMedium': '#6e7681', 'Note': '#6e7681', 'Feature': '#6e7681', 'Place': '#6e7681', 'Attachment': '#6e7681', 'Channel': '#6e7681', 'MarketSegment': '#6e7681',
};
var DEFAULT_COLOR = '#8b949e';

function getColor(node) {
  return DOMAIN_COLORS[node.label] || DOMAIN_COLORS[node.type] || DEFAULT_COLOR;
}

// ============================================================
// INIT
// ============================================================
function detectGPU() {
  try {
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl2') || c.getContext('webgl');
    if (!gl) return false;
    var dbg = gl.getExtension('WEBGL_debug_renderer_info');
    var renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : '';
    return renderer && !(/swiftshader|llvmpipe|mesa/i.test(renderer));
  } catch(e) { return false; }
}

async function init() {
  var hasGPU = detectGPU();
  var badge = document.getElementById('gpu-badge');
  if (hasGPU) {
    badge.textContent = '⚡ GPU detected';
    badge.className = 'gpu';
  } else {
    badge.textContent = '🖥 CPU only (no GPU)';
    badge.className = 'cpu';
  }

  var resp = await fetch('/api/new-graph');
  var data = await resp.json();
  allNodes = data.nodes || [];
  allEdges = data.edges || [];

  // Build indexes
  allNodes.forEach(function(n) {
    nodeMap[n.id] = n;
    n.color = getColor(n);
    n.degree = 0;
  });
  allEdges.forEach(function(e) {
    if (!adjOut[e.source]) adjOut[e.source] = [];
    if (!adjIn[e.target]) adjIn[e.target] = [];
    adjOut[e.source].push(e);
    adjIn[e.target].push(e);
    if (nodeMap[e.source]) nodeMap[e.source].degree = (nodeMap[e.source].degree||0) + 1;
    if (nodeMap[e.target]) nodeMap[e.target].degree = (nodeMap[e.target].degree||0) + 1;
  });

  document.getElementById('stats').textContent = allNodes.length + ' nodes · ' + allEdges.length + ' edges';

  if (allNodes.length === 0) {
    document.getElementById('stats-bar-sidebar').textContent = 'No graph data. Build an ontology first.';
    document.getElementById('graph').innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#6e7681;font-size:14px;text-align:center;">No graph data yet.<br><br><span style="font-size:12px;">Build an ontology from the Studio to see it here.</span></div>';
    return;
  }
  fetch('/api/stats').then(function(r){return r.json();}).then(function(s){
    var txt = s.triples+' triples · '+s.nodes+' nodes · '+s.edges+' edges · '+Object.keys(s.types).length+' types';
    document.getElementById('stats-bar').textContent = txt;
    document.getElementById('stats-bar-sidebar').textContent = txt;
  }).catch(function(){});
  buildLegend();
  buildTypeFilters();
  renderGraph(allNodes, allEdges);
  setupSearch();
}

// ============================================================
// RENDER
// ============================================================
function renderGraph(nodes, edges) {
  var container = document.getElementById('graph');
  var area = document.getElementById('graph-area');
  if (graph) { container.innerHTML = ''; graph = null; }

  var gData = {
    nodes: nodes.map(function(n) { return Object.assign({}, n); }),
    links: edges.map(function(e) { return {source:e.source, target:e.target, relation:e.relation}; })
  };

  if (is3D) {
    graph = ForceGraph3D()(container)
      .graphData(gData)
      .nodeLabel(function(n) { return n.label + ' (' + (n.type||'') + ')'; })
      .nodeColor(function(n) { return n.color || DEFAULT_COLOR; })
      .nodeVal(function(n) { return 2 + Math.sqrt(n.degree || 1); })
      .linkDirectionalArrowLength(3)
      .linkColor(function() { return 'rgba(88,166,255,0.2)'; })
      .linkWidth(0.5)
      .backgroundColor('#080810')
      .onNodeClick(function(n) { drillInto(n.id); })
      .onNodeRightClick(function(n) { focusNode(n.id); })
      .width(area.clientWidth || window.innerWidth - 640)
      .height(area.clientHeight || window.innerHeight - 76);
    if (!physicsOn) setTimeout(function(){ graph.d3Force('charge', null); }, 3000);
    return;
  }

  graph = ForceGraph()(container)
    .graphData(gData)
    .nodeCanvasObject(function(node, ctx, globalScale) {
      var size = 3 + Math.sqrt(node.degree || 1) * 2;
      var color = node.color || DEFAULT_COLOR;
      var isSelected = selectedNode === node.id;
      var isDrillPath = focusedNodes && focusedNodes.has(node.id);
      var isNeighbor = false;
      if (selectedNode && !isDrillPath) {
        var outs = adjOut[selectedNode] || [];
        var ins = adjIn[selectedNode] || [];
        for (var i=0;i<outs.length;i++) { if (outs[i].target===node.id) { isNeighbor=true; break; } }
        if (!isNeighbor) for (var i=0;i<ins.length;i++) { if (ins[i].source===node.id) { isNeighbor=true; break; } }
      }
      var isFaded = focusedNodes && !isDrillPath && !isNeighbor;
      var alpha = isFaded ? 0.06 : (isDrillPath ? 1 : 0.5);

      ctx.globalAlpha = alpha;

      // Glow for selected
      if (isSelected) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 20;
      }

      // Node circle
      ctx.beginPath();
      ctx.arc(node.x, node.y, size, 0, 2 * Math.PI);
      ctx.fillStyle = isSelected ? '#ffffff' : color;
      ctx.fill();

      if (isSelected) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Label
      if (!isFaded && (globalScale > 1.2 || isSelected || isDrillPath || size > 6)) {
        ctx.font = (isSelected ? 'bold ' : '') + Math.max(11/globalScale, 3) + 'px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillStyle = isSelected ? '#ffffff' : 'rgba(255,255,255,0.7)';
        ctx.fillText(node.label, node.x, node.y + size + 3);
      }

      ctx.globalAlpha = 1;
    })
    .nodeCanvasObjectMode(function() { return 'replace'; })
    .linkColor(function(link) {
      if (focusedNodes) {
        var srcIn = focusedNodes.has(typeof link.source === 'object' ? link.source.id : link.source);
        var tgtIn = focusedNodes.has(typeof link.target === 'object' ? link.target.id : link.target);
        return (srcIn && tgtIn) ? 'rgba(88,166,255,0.4)' : 'rgba(88,166,255,0.02)';
      }
      return 'rgba(88,166,255,0.12)';
    })
    .linkWidth(function(link) {
      if (!focusedNodes) return 0.5;
      var srcIn = focusedNodes.has(typeof link.source === 'object' ? link.source.id : link.source);
      var tgtIn = focusedNodes.has(typeof link.target === 'object' ? link.target.id : link.target);
      return (srcIn && tgtIn) ? 1.5 : 0.2;
    })
    .linkDirectionalArrowLength(3)
    .linkDirectionalArrowRelPos(0.8)
    .linkLabel(function(link) { return link.relation; })
    .backgroundColor('#080810')
    .onNodeClick(function(node) { drillInto(node.id); })
    .onNodeRightClick(function(node) { drillInto(node.id); })
    .onBackgroundClick(function() { resetFocus(); })
    .width(area.clientWidth || window.innerWidth - 640)
    .height(area.clientHeight || window.innerHeight - 76)
    .cooldownTicks(100);

  graph.d3Force('charge').strength(-120);
  graph.d3Force('link').distance(60);

  // Auto-fit after simulation settles
  setTimeout(function() { if (graph) graph.zoomToFit(400, 40); }, 1500);
}

// ============================================================
// FOCUS â€” click a node, everything else fades
// ============================================================
function focusNode(id) {
  selectedNode = id;
  document.getElementById('btn-expand').disabled = false;
  var neighbors = new Set([id]);
  (adjOut[id] || []).forEach(function(e) { neighbors.add(e.target); });
  (adjIn[id] || []).forEach(function(e) { neighbors.add(e.source); });
  focusedNodes = neighbors;

  showDetail(id);
  if (!is3D) graph.nodeCanvasObject(graph.nodeCanvasObject());

  var node = graph.graphData().nodes.find(function(n) { return n.id === id; });
  if (node) {
    if (is3D) {
      graph.cameraPosition({x:node.x, y:node.y, z:node.z+150}, node, 600);
    } else {
      graph.centerAt(node.x, node.y, 600);
      graph.zoom(2.5, 600);
    }
  }
}

function resetFocus() {
  selectedNode = null;
  focusedNodes = null;
  document.getElementById('btn-expand').disabled = true;
  document.getElementById('detail').classList.remove('visible');
  document.getElementById('no-detail').style.display = '';
  if (!is3D) graph.nodeCanvasObject(graph.nodeCanvasObject());
}

// ============================================================
// DRILL-DOWN â€” right-click to expand deeper
// ============================================================
function drillInto(id) {
  var hops = parseInt(document.getElementById('hop-slider').value);
  drillHistory.push(id);
  drillDepth++;
  document.getElementById('depth-indicator').style.display = '';
  document.getElementById('depth-indicator').textContent = 'Depth: ' + drillDepth + ' | Hops: ' + hops + ' | Click to keep drilling | Reset to come back';

  // Expand N hops from this node
  var visited = new Set([id]);
  var frontier = [id];
  for (var h = 0; h < hops; h++) {
    var next = [];
    frontier.forEach(function(nid) {
      (adjOut[nid] || []).forEach(function(e) { if (!visited.has(e.target)) { visited.add(e.target); next.push(e.target); } });
      (adjIn[nid] || []).forEach(function(e) { if (!visited.has(e.source)) { visited.add(e.source); next.push(e.source); } });
    });
    frontier = next;
  }

  // Merge with existing focused nodes
  if (!focusedNodes) focusedNodes = new Set();
  visited.forEach(function(n) { focusedNodes.add(n); });

  selectedNode = id;
  showDetail(id);
  if (!is3D) graph.nodeCanvasObject(graph.nodeCanvasObject());

  var node = graph.graphData().nodes.find(function(n) { return n.id === id; });
  if (node) {
    if (is3D) {
      graph.cameraPosition({x:node.x, y:node.y, z:node.z+200}, node, 1000);
    } else {
      graph.centerAt(node.x, node.y, 800);
      graph.zoom(3, 800);
    }
  }
}

// ============================================================
// DETAIL PANEL
// ============================================================
function showDetail(id) {
  var node = nodeMap[id];
  if (!node) return;
  document.getElementById('no-detail').style.display = 'none';
  var det = document.getElementById('detail');
  det.classList.add('visible');
  document.getElementById('d-name').textContent = node.label;
  var badge = document.getElementById('d-type');
  badge.textContent = node.type || 'unknown';
  badge.style.background = node.color;
  badge.style.color = '#fff';
  document.getElementById('d-desc').textContent = node.description || '';

  var conns = [];
  (adjOut[id] || []).forEach(function(e) {
    var t = nodeMap[e.target];
    if (t) conns.push({id: e.target, label: t.label, rel: e.relation, dir: 'out', color: t.color});
  });
  (adjIn[id] || []).forEach(function(e) {
    var s = nodeMap[e.source];
    if (s) conns.push({id: e.source, label: s.label, rel: e.relation, dir: 'in', color: s.color});
  });

  var html = conns.map(function(c) {
    var arrow = c.dir === 'out' ? 'â†’' : 'â†';
    return '<div class="conn" onclick="drillInto(\'' + c.id + '\')">' +
      '<span class="arrow">' + arrow + '</span>' +
      '<span style="color:' + c.color + '">' + c.label + '</span>' +
      '<span class="rel">' + c.rel + '</span></div>';
  }).join('');
  document.getElementById('d-conns').innerHTML = html || '<span style="color:#6e7681;font-size:11px;">No connections</span>';
}

function setupSearch() {
  var input = document.getElementById('search');
  var results = document.getElementById('search-results');
  var timeout;
  input.addEventListener('input', function() {
    clearTimeout(timeout);
    timeout = setTimeout(function() {
      var q = input.value.toLowerCase();
      if (q.length < 2) { results.innerHTML = ''; return; }
      var matches = allNodes.filter(function(n) {
        return n.label.toLowerCase().indexOf(q) > -1 || n.id.toLowerCase().indexOf(q) > -1;
      }).slice(0, 15);
      if (!matches.length) { results.innerHTML = ''; return; }
      results.innerHTML = matches.map(function(n) {
        return '<div class="item" onclick="focusNode(\'' + n.id + '\')">' +
          '<span style="display:flex;align-items:center;"><span class="dot" style="background:' + n.color + '"></span>' + n.label + '</span>' +
          '<span style="color:#6e7681;font-size:10px;">' + (n.type||'') + '</span></div>';
      }).join('');
    }, 150);
  });
}

async function sendChat() {
  var input = document.getElementById('chat-input');
  var q = input.value.trim();
  if (!q) return;
  input.value = '';
  addChatMsg(q, 'user');
  addChatMsg('Thinking...', 'assistant', 'thinking');

  var endpoint = chatMode==='sparql' ? '/api/ask/sparql' : '/api/ask/project';
  try {
    var resp = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:q}) });
    var data = await resp.json();
    var el = document.getElementById('thinking');
    if (el) el.remove();
    if (data.error && !data.answer) {
      addChatMsg('Error: ' + data.error, 'assistant');
      return;
    }
    var msg = data.answer || '';
    if (data.sparql) msg += '\n\nSPARQL:\n' + data.sparql;
    if (data.count !== undefined) msg += '\n(' + data.count + ' results)';
    addChatMsg(msg, 'assistant');
  } catch(e) {
    var el = document.getElementById('thinking');
    if (el) el.remove();
    addChatMsg('Error: ' + e.message, 'assistant');
  }
}

  var el = document.getElementById('chat-messages');

  if (role==='user') {
    bubble.style.background = '#1f6feb';
    bubble.style.color = '#ffffff';
  } else {
    bubble.style.background = 'rgba(30,30,50,0.9)';
    bubble.style.color = '#c9d1d9';
    bubble.style.border = '1px solid rgba(255,255,255,0.06)';
  }
  bubble.textContent = text;
  div.appendChild(bubble);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ============================================================
// PATH FINDER
// ============================================================
async function findPath() {
  var from = document.getElementById('path-from').value.trim();
  var to = document.getElementById('path-to').value.trim();
  if (!from || !to) return;
  // Find node IDs by label match
  var fromNode = allNodes.find(function(n) { return n.label.toLowerCase().indexOf(from.toLowerCase()) > -1; });
  var toNode = allNodes.find(function(n) { return n.label.toLowerCase().indexOf(to.toLowerCase()) > -1; });
  if (!fromNode || !toNode) { document.getElementById('path-result').textContent = 'Node not found'; return; }
  // BFS
  var visited = {};
  visited[fromNode.id] = null;
  var queue = [fromNode.id];
  var found = false;
  while (queue.length > 0) {
    var current = queue.shift();
    if (current === toNode.id) { found = true; break; }
    var neighbors = [];
    (adjOut[current] || []).forEach(function(e) { neighbors.push(e.target); });
    (adjIn[current] || []).forEach(function(e) { neighbors.push(e.source); });
    for (var i = 0; i < neighbors.length; i++) {
      if (!(neighbors[i] in visited)) {
        visited[neighbors[i]] = current;
        queue.push(neighbors[i]);
      }
    }
  }
  if (!found) { document.getElementById('path-result').textContent = 'No path found'; return; }
  // Reconstruct path
  var path = [];
  var cur = toNode.id;
  while (cur !== null) { path.unshift(cur); cur = visited[cur]; }
  // Highlight path
  focusedNodes = new Set(path);
  selectedNode = fromNode.id;
  graph.nodeCanvasObject(graph.nodeCanvasObject());
  document.getElementById('path-result').textContent = path.map(function(id) { return (nodeMap[id]||{}).label||id; }).join(' -> ');
  // Center on midpoint
  var midNode = graph.graphData().nodes.find(function(n) { return n.id === path[Math.floor(path.length/2)]; });
  if (midNode) { graph.centerAt(midNode.x, midNode.y, 600); graph.zoom(2, 600); }
}

// ============================================================
// TYPE FILTERS
// ============================================================
var activeTypes = new Set();

function buildTypeFilters() {
  var types = {};
  allNodes.forEach(function(n) { types[n.type] = (types[n.type]||0) + 1; });
  if (activeTypes.size === 0) Object.keys(types).forEach(function(t) { activeTypes.add(t); });
  var el = document.getElementById('type-filters');
  el.innerHTML = Object.entries(types).sort(function(a,b){ return b[1]-a[1]; }).map(function(entry) {
    var t = entry[0], c = entry[1];
    var isOn = activeTypes.has(t);
    var color = DOMAIN_COLORS[t] || DEFAULT_COLOR;
    return '<span class="ftag ' + (isOn?'on':'off') + '" style="border:1px solid ' + (isOn?color:'#333') + ';color:' + (isOn?color:'#555') + ';" onclick="toggleTypeFilter(\''+t+'\')">' + t + ' (' + c + ')</span>';
  }).join('');
}

function toggleTypeFilter(type) {
  if (activeTypes.has(type)) activeTypes.delete(type);
  else activeTypes.add(type);
  buildTypeFilters();
  var visible = new Set();
  allNodes.forEach(function(n) { if (activeTypes.has(n.type)) visible.add(n.id); });
  focusedNodes = visible.size < allNodes.length ? visible : null;
  graph.nodeCanvasObject(graph.nodeCanvasObject());
}

// ============================================================
// STATS / GOD NODES
// ============================================================
function showStats() {
  var types = {};
  var relations = {};
  allNodes.forEach(function(n) { types[n.type] = (types[n.type]||0)+1; });
  allEdges.forEach(function(e) { relations[e.relation] = (relations[e.relation]||0)+1; });
  // God nodes (top 5 by degree)
  var sorted = allNodes.slice().sort(function(a,b) { return (b.degree||0)-(a.degree||0); });
  var gods = sorted.slice(0,5);

  var html = '<b>Nodes:</b> ' + allNodes.length + ' | <b>Edges:</b> ' + allEdges.length + '<br><br>';
  html += '<b>Types:</b><br>';
  Object.entries(types).sort(function(a,b){return b[1]-a[1];}).forEach(function(e) { html += '&nbsp;&nbsp;' + e[0] + ': ' + e[1] + '<br>'; });
  html += '<br><b>Top Relations:</b><br>';
  Object.entries(relations).sort(function(a,b){return b[1]-a[1];}).slice(0,8).forEach(function(e) { html += '&nbsp;&nbsp;' + e[0] + ': ' + e[1] + '<br>'; });
  html += '<br><b>God Nodes (most connected):</b><br>';
  gods.forEach(function(n) { html += '&nbsp;&nbsp;<span style="color:'+n.color+'">' + n.label + '</span> (' + (n.degree||0) + ' edges)<br>'; });

  document.getElementById('stats-content').innerHTML = html;
  document.getElementById('stats-modal').style.display = 'block';
}
