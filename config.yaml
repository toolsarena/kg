domain: "knowledge-base"
base_uri: "http://kg.local/"

# Switch provider to "bedrock" when you have access
llm:
  provider: "ollama"
  model: "qwen2.5-coder:7b"
  base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 4096
  # Bedrock settings (used when provider: "bedrock")
  # model: "anthropic.claude-3-haiku-20240307-v1:0"
  # region: "us-east-1"

ontology:
  custom: null  # path to your custom .ttl if you have one
  base: "model/templates/base_ontology.ttl"

sparql:
  backend: "memory"  # rdflib in-memory store

viz:
  physics: true
  drill_down_depth: 3
